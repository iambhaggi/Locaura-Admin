name: locaura_parter
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # DI
  get_it: ^7.6.7
  injectable: ^2.3.2

  # Navigation
  go_router: ^13.2.0

  # Network
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Functional Programming
  fpdart: ^1.1.0

  # Models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Env
  envied: ^0.5.3

  # Utils
  logger: ^2.3.0
  flutter_screenutil: ^5.9.0
  cached_network_image: ^3.4.1
  fl_chart: ^1.2.0
  intl: ^0.20.2
  image_picker: ^1.2.1
  geolocator: ^14.0.2
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  injectable_generator: ^2.4.1
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  envied_generator: ^0.5.3
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:

  uses-material-design: true
  assets:
    - assets/images/
